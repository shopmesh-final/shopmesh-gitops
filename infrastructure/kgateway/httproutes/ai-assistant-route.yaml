apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-assistant-route
  namespace: production
spec:
  parentRefs:
    - name: prod
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/assistant
      backendRefs:
        - name: ai-assistant-service
          port: 3005
