apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: analytics-route
  namespace: production
spec:
  parentRefs:
    - name: kgateway
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/analytics
      backendRefs:
        - name: analytics-service
          port: 3004
