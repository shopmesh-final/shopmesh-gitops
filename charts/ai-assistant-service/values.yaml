namespace: production
replicaCount: 2

image:
  repository: 242969680553.dkr.ecr.us-east-1.amazonaws.com/shopmesh/ai-assistant-service
  tag: latest
  pullPolicy: Always

service:
  port: 3005

serviceAccount:
  create: true
  roleArn: "arn:aws:iam::242969680553:role/shopmesh-irsa-ai-assistant-service"

config:
  PORT: "3005"
  LOCAL_MODE: "false"
  AWS_REGION: "us-east-1"
  BEDROCK_MODEL_ID: "amazon.nova-lite-v1:0"
  AUTH_SERVICE_URL: "http://auth-service.production.svc.cluster.local:3001"
  PRODUCT_SERVICE_URL: "http://product-service.production.svc.cluster.local:3002"
  ORDER_SERVICE_URL: "http://order-service.production.svc.cluster.local:3003"

externalSecret:
  enabled: false

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  minReplicas: 2
  maxReplicas: 6
  cpuTargetUtilization: 60
  memoryTargetUtilization: 75

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

networkPolicy:
  enabled: true
