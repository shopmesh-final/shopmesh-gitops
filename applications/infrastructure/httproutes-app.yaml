apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: httproutes
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/shopmesh-final/shopmesh-gitops.git
    targetRevision: HEAD
    path: infrastructure/kgateway/httproutes
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
