apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "65.1.1"
    helm:
      values: |
        fullnameOverride: monitoring

        grafana:
          enabled: true
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: "arn:aws:iam::242969680553:role/shopmesh-irsa-grafana"
          grafana.ini:
            server:
              root_url: "https://shopmesh.shop/grafana"
              serve_from_sub_path: true
          persistence:
            enabled: true
            storageClassName: gp2
            size: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          sidecar:
            datasources:
              enabled: false
            dashboards:
              enabled: true
              searchNamespace: ALL
              folderAnnotation: grafana_folder
              provider:
                foldersFromFilesStructure: true
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  url: http://monitoring-prometheus:9090
                  isDefault: true
                  access: proxy
                - name: CloudWatch
                  type: cloudwatch
                  jsonData:
                    authType: default
                    defaultRegion: us-east-1
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ShopMesh Kubernetes
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
                - name: aws
                  orgId: 1
                  folder: ShopMesh AWS
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/aws
          dashboards:
            default:
              node-exporter-full:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
              kubernetes-overview:
                gnetId: 15661
                revision: 1
                datasource: Prometheus
              kubernetes-workloads:
                gnetId: 15760
                revision: 34
                datasource: Prometheus
              argocd:
                gnetId: 14584
                revision: 1
                datasource: Prometheus

        prometheus:
          prometheusSpec:
            retention: 7d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp2
                  resources:
                    requests:
                      storage: 5Gi
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false

        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'null'
            receivers:
              - name: 'null'

        nodeExporter:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        kubeStateMetrics:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        defaultRules:
          create: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
