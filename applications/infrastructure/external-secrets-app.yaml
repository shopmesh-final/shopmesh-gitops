apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 0.9.20
      helm:
        releaseName: external-secrets
        values: |
          installCRDs: true
          serviceAccount:
            name: external-secrets-sa
            annotations:
              eks.amazonaws.com/role-arn: "arn:aws:iam::686591366739:role/shopmesh-irsa-external-secrets"
    - repoURL: https://github.com/shopmesh-final/shopmesh-gitops.git
      targetRevision: HEAD
      path: infrastructure/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
